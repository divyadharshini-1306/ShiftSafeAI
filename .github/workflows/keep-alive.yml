name: Keep Render Service Awake

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ShiftSafe AI backend
        run: |
          echo "Pinging service at $(date)"
          curl -s -o /dev/null -w "Status: %{http_code}\n" --max-time 60 https://shiftsafeai.onrender.com/ping
